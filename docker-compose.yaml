version: '3.8'

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bookshelf
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  validator:
    build:
      context: .
      dockerfile: Dockerfile.validator
    ports:
      - "50051:50051"

  bookshelf:
    build:
      context: .
      dockerfile: Dockerfile.bookshelf
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      VALIDATOR_ADDR: validator:50051
    depends_on:
      postgres:
        condition: service_healthy
      validator:
        condition: service_started